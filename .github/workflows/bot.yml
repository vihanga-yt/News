name: Ada Derana News Bot (JSON API)

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour (matches RSS2JSON free tier update rate)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch_and_post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # We don't even need 'npm install' because we have 0 dependencies now!
      
      - name: Run News Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: node index.js

      - name: Save State File
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_news.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update state" && git push)
